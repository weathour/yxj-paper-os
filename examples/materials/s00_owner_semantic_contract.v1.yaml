schema_version: ppg-material/v0.1
material_id: s00_owner_semantic_contract
version: v1
status: owner_gated
material_type: OwnerSemanticContract
summary: Owner semantic contract that bounds route, claim strength, source policy, external actions, and downstream stale effects.
payload:
  schema_version: ppg-s00-owner-semantic-contract/v0.1
  stage_id: S00
  completion_boundary: owner_semantic_contract_only_no_worker_completion_no_submission_claim
  paper_profile:
    target_route: KBS-style research article
    article_type: research article
    ambition_boundary: Improve stage contracts and validation without claiming final manuscript or submission readiness.
    route_status: assumed
  motivation_contract:
    core_problem: Paper-production graph stages can drift if owner semantics are too coarse.
    intended_contribution_area: Agent-executable academic paper workflow control.
    reader_value: Downstream stages receive explicit boundaries for claims, sources, route, and external actions.
  owner_decisions:
    confirmed_decisions:
      - decision_id: s00-no-worker-packet
        statement: S00 is owner-gated and must not be converted into a standard worker-production packet.
        evidence_or_context: omx_wiki/yxj-paper-os-s00-improvement-consensus.md
    owner_gated_assumptions:
      - assumption_id: s00-route-assumption
        statement: KBS-style route is usable as a planning assumption but not a submission decision.
        allowed_until: Owner confirms or changes venue route.
    rejected_routes:
      - route: worker selects journal route independently
        reason: Venue route changes are owner semantic decisions.
  claim_scope_boundary:
    allowed_claim_families:
      - bounded runtime-control improvements
      - validator-backed stage-contract improvements
    forbidden_claim_families:
      - publication ready
      - submission ready
      - universal manuscript quality guarantee
    claims_requiring_owner_confirmation:
      - stronger novelty claims
      - venue-specific promise claims
    claim_strength_increase_requires_owner: true
  source_policy:
    allowed_private_source_use: Private local materials may inform internal planning only when owner policy allows it.
    forbidden_private_source_use: Private unpublished sources must not be cited or released without owner approval.
    citation_policy_boundary: S01 must turn any citeable source into explicit provenance before downstream claim use.
    anonymization_or_redaction_required:
      - unpublished drafts
      - private owner notes
  external_action_boundary:
    submission_allowed: false
    public_release_allowed: false
    owner_approval_required_for:
      - submission
      - venue_route_change
      - claim_strength_increase
      - private_source_use
      - public_release
  blocked_routes:
    - route: mark graph or manuscript complete
      reason: S00 can only record owner semantic boundaries.
      unblock_condition: Full downstream validation and explicit owner review in later stages.
    - route: dispatch worker to decide route or claim ambition
      reason: Worker advice is advisory only and cannot commit owner intent.
      unblock_condition: Owner confirms the semantic decision and controller records it.
  downstream_effects_if_changed:
    stages_to_mark_stale:
      - S01
      - S02
      - S03
      - S04
      - S05
      - S13
      - S16
    rationale: Route, claim scope, source policy, or external-action changes affect provenance, SOTA framing, contribution options, claim admissibility, paper spine, review findings, and export/handoff claims.
  unresolved_owner_questions:
    - question: Which exact venue family is confirmed rather than assumed?
      consequence_if_unanswered: S02/S03 must keep route-specific claims tentative.
    - question: Which private-source classes may be cited, redacted, or only used internally?
      consequence_if_unanswered: S01/S04 must block unsupported citation or claim use.
