schema_version: ppg-material/v0.1
material_id: phase10_s06_object_granularity
version: v1
status: candidate
material_type: S06ObjectGranularity
created_at: "2026-07-01T00:00:00Z"
created_by: phase10_s06_object_granularity_design_packet_v1
source_inputs:
  - phase10_s05_reader_spine
  - phase10_s04_claim_admissibility
  - phase10_s02_research_dossier
artifact_path: examples/materials/phase10_s06_object_granularity.yaml
summary: Object and mechanism-variable representation plan with granularity, load, ladder, and downstream handoff coverage.
payload:
  schema_version: ppg-s06-object-granularity/v0.1
  stage_id: S06
  completion_boundary: object_granularity_design_only_no_new_claims_no_final_prose_no_graph_or_manuscript_completion
  object_inventory:
    objects:
      - object_id: obj-trust-state
        object_name: trust-state object
        object_type: mechanism
        priority: P0
        source_materials: phase10_s05_reader_spine#s06_handoff
        related_claim_ids: claim-mechanism-bounded
        related_reader_question_ids: rq-problem-pressure
        status: represented
      - object_id: obj-reconfiguration-decision
        object_name: reconfiguration-decision object
        object_type: mechanism
        priority: P0
        source_materials: phase10_s05_reader_spine#s06_handoff
        related_claim_ids: claim-mechanism-bounded
        related_reader_question_ids: rq-problem-pressure
        status: represented
      - object_id: obj-evidence-boundary
        object_name: evidence-boundary object
        object_type: claim_boundary
        priority: P1
        source_materials: phase10_s04_claim_admissibility#result_package_boundary
        related_claim_ids: claim-mechanism-bounded
        related_reader_question_ids: rq-evidence-boundary
        status: represented
      - object_id: obj-deployment-readiness
        object_name: deployment-readiness excluded object
        object_type: limitation_boundary
        priority: P4
        source_materials: phase10_s04_claim_admissibility#claim-deployment-rejected
        related_claim_ids: claim-deployment-rejected
        related_reader_question_ids: rq-evidence-boundary
        status: excluded
  mechanism_variable_inventory:
    variables:
      - variable_id: var-trust-score
        variable_name: trust score
        variable_type: state_metric
        belongs_to_object: obj-trust-state
        role_in_method: drives trust-state representation
        role_in_experiment: conditions reconfiguration comparison
        definition_status: needs operational definition before formal detail
        notation_or_name: T_state
        confusion_risk: could be mistaken for deployed security certification
        status: represented
      - variable_id: var-reconfiguration-action
        variable_name: reconfiguration action
        variable_type: decision_state
        belongs_to_object: obj-reconfiguration-decision
        role_in_method: represents platoon membership or control adjustment
        role_in_experiment: labels mechanism response under stress
        definition_status: intuitive then operational
        notation_or_name: a_reconfig
        confusion_risk: could imply deployment authority if overexplained
        status: represented
      - variable_id: var-support-strength
        variable_name: support strength
        variable_type: evidence_boundary
        belongs_to_object: obj-evidence-boundary
        role_in_method: constrains claim wording
        role_in_experiment: links result package to allowed claim strength
        definition_status: textual boundary only
        notation_or_name: support_strength
        confusion_risk: could be read as statistical proof if not bounded
        status: represented
  object_cards:
    cards:
      - object_id: obj-trust-state
        first_appearance: Introduction problem pressure
        sections_used: Introduction, Method, Results
        representation_modes: intuitive description, operational definition, evidence-boundary reference
        granularity_by_section: intuitive in introduction; operational in method; empirical in results
        required_definition: define as paper-internal trust-state abstraction, not deployment certification
        required_example: one stress-state example from result package
        required_visual_or_formula: possible S08 mechanism overview panel
        cognitive_load_risk: high if introduced with formal notation too early
        repetition_risk: avoid redefining trust state in every section
        confusion_risk: security certification overclaim
        downstream_handoff: S07 naming consistency; S08 mechanism panel; S10 section instructions
        status: represented
      - object_id: obj-reconfiguration-decision
        first_appearance: Method overview
        sections_used: Method, Results
        representation_modes: pipeline role, operational definition, empirical instantiation
        granularity_by_section: operational in method; empirical in results
        required_definition: specify decision state and action boundary
        required_example: transition from stress state to reconfiguration action
        required_visual_or_formula: possible flow arrow or algorithm box
        cognitive_load_risk: medium if combined with trust score notation too soon
        repetition_risk: repeated action lists without progression
        confusion_risk: deployment authority implication
        downstream_handoff: S08 algorithm/flow need; S10 method-unit instruction
        status: represented
      - object_id: obj-evidence-boundary
        first_appearance: Introduction caveat
        sections_used: Introduction, Results and limitations
        representation_modes: claim boundary, limitation marker, result-package trace
        granularity_by_section: mention in introduction; boundary in results; limitation in discussion
        required_definition: identify what current evidence supports and excludes
        required_example: deployment-readiness exclusion
        required_visual_or_formula: result-boundary table need
        cognitive_load_risk: low but easy to omit
        repetition_risk: boundary repeated without claim trace
        confusion_risk: moderate support overstated as proof
        downstream_handoff: S07 strength language; S10 limitation instruction
        status: represented
  mechanism_variable_cards:
    cards:
      - variable_id: var-trust-score
        variable_name: trust score
        variable_type: state_metric
        belongs_to_object: obj-trust-state
        role_in_method: trust-state representation input
        role_in_experiment: stress-response condition
        sections_used: Method, Results
        definition_status: operational definition required
        notation_or_name: T_state
        evidence_source_ref: phase10_s04_claim_admissibility#claim-mechanism-bounded
        confusion_risk: not a certification metric
        visualization_need: include only if S08 mechanism panel has space
        status: represented
      - variable_id: var-reconfiguration-action
        variable_name: reconfiguration action
        variable_type: decision_state
        belongs_to_object: obj-reconfiguration-decision
        role_in_method: action selected by mechanism
        role_in_experiment: outcome label for response
        sections_used: Method, Results
        definition_status: intuitive then operational
        notation_or_name: a_reconfig
        evidence_source_ref: phase10_s04_claim_admissibility#claim-mechanism-bounded
        confusion_risk: not deployment authority
        visualization_need: possible flow arrow
        status: represented
      - variable_id: var-support-strength
        variable_name: support strength
        variable_type: evidence_boundary
        belongs_to_object: obj-evidence-boundary
        role_in_method: claim wording constraint
        role_in_experiment: result interpretation boundary
        sections_used: Results and limitations
        definition_status: text boundary only
        notation_or_name: support_strength
        evidence_source_ref: phase10_s04_claim_admissibility#support_strength_map
        confusion_risk: not statistical proof
        visualization_need: result-boundary table only
        status: represented
  cross_maps:
    object_relation_map:
      - source_object_id: obj-trust-state
        target_object_id: obj-reconfiguration-decision
        relation_type: drives
        explanation: trust-state abstraction conditions the reconfiguration decision object
      - source_object_id: obj-evidence-boundary
        target_object_id: obj-trust-state
        relation_type: constrains_claim_about
        explanation: evidence boundary constrains how trust-state mechanism support can be stated
    object_to_claim_map:
      - object_id: obj-trust-state
        claim_id: claim-mechanism-bounded
        mapping_role: core mechanism object for admitted claim
      - object_id: obj-reconfiguration-decision
        claim_id: claim-mechanism-bounded
        mapping_role: decision side of admitted mechanism claim
      - object_id: obj-evidence-boundary
        claim_id: claim-mechanism-bounded
        mapping_role: support-strength caveat carrier
    object_to_section_map:
      - object_id: obj-trust-state
        section: Introduction
        section_role: motivate and name the central mechanism object
      - object_id: obj-trust-state
        section: Method
        section_role: define operational role
      - object_id: obj-reconfiguration-decision
        section: Method
        section_role: define decision state
      - object_id: obj-reconfiguration-decision
        section: Results
        section_role: instantiate mechanism response
      - object_id: obj-evidence-boundary
        section: Results and limitations
        section_role: bound supported claim and excluded deployment claim
    variable_to_object_map:
      - variable_id: var-trust-score
        object_id: obj-trust-state
        relation: describes state metric of trust-state object
      - variable_id: var-reconfiguration-action
        object_id: obj-reconfiguration-decision
        relation: names action state of decision object
      - variable_id: var-support-strength
        object_id: obj-evidence-boundary
        relation: records evidence-boundary support level
    section_object_load_map:
      - section: Introduction
        new_objects: obj-trust-state
        reused_objects: obj-evidence-boundary
        load_risk: moderate if trust state is formalized too early
      - section: Method
        new_objects: obj-reconfiguration-decision
        reused_objects: obj-trust-state
        load_risk: high if both objects and variables are introduced without ladder
      - section: Results
        new_objects: no new object
        reused_objects: obj-trust-state, obj-reconfiguration-decision
        load_risk: medium due empirical instantiation
      - section: Results and limitations
        new_objects: no new object
        reused_objects: obj-evidence-boundary
        load_risk: low but must avoid overclaim
  granularity_progression_map:
    entries:
      - object_id: obj-trust-state
        section: Introduction
        intended_granularity: intuitive_description
        reason: motivate reader question without notation overload
        forbidden_detail_level: formal definition
        next_granularity_step: operational definition in Method
      - object_id: obj-trust-state
        section: Method
        intended_granularity: operational_definition
        reason: method needs object role and variable boundary
        forbidden_detail_level: deployment certification interpretation
        next_granularity_step: empirical instantiation in Results
      - object_id: obj-reconfiguration-decision
        section: Method
        intended_granularity: operational_definition
        reason: method must define the decision object before results
        forbidden_detail_level: deployment authority claim
        next_granularity_step: empirical instantiation in Results
      - object_id: obj-evidence-boundary
        section: Results and limitations
        intended_granularity: limitation_boundary
        reason: readers need support and exclusion boundary
        forbidden_detail_level: statistical proof or deployment readiness
        next_granularity_step: retain as limitation boundary
  section_function_budget:
    sections:
      - section: Introduction
        allowed_object_functions: motivate obj-trust-state and preview evidence boundary
        forbidden_object_functions: formal notation, deployment readiness
        max_new_core_objects: "1"
        required_prior_context: S02 problem pressure and S05 reader question
        risk_if_overloaded: reader sees a mechanism catalog rather than a problem route
      - section: Method
        allowed_object_functions: define obj-trust-state and obj-reconfiguration-decision operationally
        forbidden_object_functions: empirical conclusion or deployment claim
        max_new_core_objects: "1"
        required_prior_context: introduction object preview
        risk_if_overloaded: method becomes a glossary instead of a mechanism
      - section: Results
        allowed_object_functions: instantiate trust-state and decision objects with evidence boundary
        forbidden_object_functions: redefine all objects from scratch
        max_new_core_objects: "0"
        required_prior_context: Method definitions
        risk_if_overloaded: results repeat method without progression
      - section: Results and limitations
        allowed_object_functions: state evidence boundary and deployment exclusion
        forbidden_object_functions: introduce settled deployment object
        max_new_core_objects: "0"
        required_prior_context: S04 support strength map
        risk_if_overloaded: limitation appears as new contribution claim
  cognitive_load_budget:
    sections:
      - section: Introduction
        new_objects: obj-trust-state
        reused_objects: obj-evidence-boundary
        formal_symbols: no formal symbols
        reader_load_risk: moderate
        mitigation: intuitive description only
        defer_to_section_or_supplement: defer notation to Method
      - section: Method
        new_objects: obj-reconfiguration-decision
        reused_objects: obj-trust-state
        formal_symbols: T_state, a_reconfig
        reader_load_risk: high
        mitigation: introduce variables after object roles
        defer_to_section_or_supplement: defer empirical examples to Results
      - section: Results
        new_objects: no new object
        reused_objects: obj-trust-state, obj-reconfiguration-decision
        formal_symbols: T_state, a_reconfig
        reader_load_risk: medium
        mitigation: use empirical instantiation rather than redefinition
        defer_to_section_or_supplement: defer extra scenarios to supplement
      - section: Results and limitations
        new_objects: no new object
        reused_objects: obj-evidence-boundary
        formal_symbols: support_strength
        reader_load_risk: low
        mitigation: state boundary in claim language
        defer_to_section_or_supplement: no supplement required
  explanation_ladder:
    ladders:
      - object_id: obj-trust-state
        intuition: a compact representation of security condition changes
        pipeline_role: input-side mechanism object
        definition: paper-internal trust-state abstraction
        mechanism: conditions reconfiguration decision
        formalism: T_state only after operational explanation
        empirical_example: stress-state example in results
        boundary_limitation: not a deployment certification object
      - object_id: obj-reconfiguration-decision
        intuition: the mechanism response when trust state changes
        pipeline_role: output-side decision object
        definition: reconfiguration action selected within the paper mechanism
        mechanism: maps state shift to platoon adjustment
        formalism: a_reconfig after method definition
        empirical_example: response case in results
        boundary_limitation: not public-road deployment authority
      - object_id: obj-evidence-boundary
        intuition: what evidence supports and excludes
        pipeline_role: claim-safety object
        definition: support-strength and forbidden interpretation boundary
        mechanism: constrains wording and result interpretation
        formalism: textual boundary only
        empirical_example: deployment-readiness exclusion
        boundary_limitation: moderate mechanism support only
  repetition_risk_register:
    checked_object_ids:
      - obj-trust-state
      - obj-reconfiguration-decision
      - obj-evidence-boundary
    risks: []
  coverage_ledger:
    objects_detected:
      - obj-trust-state
      - obj-reconfiguration-decision
      - obj-evidence-boundary
      - obj-deployment-readiness
    objects_processed:
      - obj-trust-state
      - obj-reconfiguration-decision
      - obj-evidence-boundary
      - obj-deployment-readiness
    objects_unresolved: []
    variables_detected:
      - var-trust-score
      - var-reconfiguration-action
      - var-support-strength
    variables_processed:
      - var-trust-score
      - var-reconfiguration-action
      - var-support-strength
    variables_unresolved: []
    claims_mapped:
      - claim-mechanism-bounded
      - claim-deployment-rejected
    claims_unmapped: []
    reader_questions_mapped:
      - rq-problem-pressure
      - rq-evidence-boundary
    reader_questions_unmapped: []
    sections_with_load_budget:
      - Introduction
      - Method
      - Results
      - Results and limitations
    sections_missing_load_budget: []
  unresolved_object_report:
    items: []
    backflow_targets: []
  handoff_to_s07:
    handoff_summary: Keep object names stable and preserve moderate claim-strength language.
    allowed_use: terminology, naming consistency, and surface-control planning
    misuse_warning: do not turn object cards into final sentences or stronger claims
    items:
      - obj-trust-state naming consistency
      - obj-evidence-boundary claim-strength language
  handoff_to_s08:
    handoff_summary: Consider mechanism overview and result-boundary visual/formal plans.
    allowed_use: figure/table/formal object planning only
    misuse_warning: do not finalize figure contracts or captions in S06
    items:
      - mechanism overview panel for obj-trust-state and obj-reconfiguration-decision
      - result-boundary table for obj-evidence-boundary
  handoff_to_s10:
    handoff_summary: Provide section-level object instructions through S09A/S09B before writing.
    allowed_use: section object instructions, definitions, caveats, and over-detail prohibitions
    misuse_warning: S10 must consume this through task packets, not as free-form drafting authority
    items:
      - Introduction uses intuitive trust-state description only
      - Method defines operational objects before variables
      - Results instantiate objects without flat repetition
      - Limitations keeps deployment-readiness excluded
  coherence_and_boundary_audit:
    no_new_claims: true
    no_strengthened_claims: true
    no_final_prose: true
    no_hidden_unresolved_objects: true
    no_flat_repetition_without_progression: true
    remaining_risks:
      - S09/S10 must not convert object cards into rigid prose templates
  candidate_return:
    candidate_artifact: examples/materials/phase10_s06_object_granularity.yaml
    evidence:
      - every detected object is processed or explicitly excluded
      - every represented mechanism variable has a variable card
      - S07/S08/S10 handoffs are explicit
    remaining_risks:
      - downstream writing must preserve flexible organization rather than copy card order
validators:
  - validate_material:S06ObjectGranularity
  - object_inventory_required:S06
  - mechanism_variable_inventory_required:S06
  - object_cards_required:S06
  - granularity_progression_required:S06
  - downstream_handoff_required:S06
downstream_consumers:
  - S07
  - S08
  - S09A
  - S10
invalidation_policy:
  stale_when:
    - S05 reader spine changes
    - S04 claim visibility changes
    - S02 template profile changes
provenance:
  packet_id: phase10_s06_object_granularity_design_packet_v1
