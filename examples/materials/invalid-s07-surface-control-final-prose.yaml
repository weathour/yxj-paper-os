schema_version: ppg-material/v0.1
material_id: phase10_s07_surface_control
version: v1
status: candidate
material_type: S07RhetoricSurfaceControl
created_at: "2026-07-01T00:00:00Z"
created_by: phase10_s07_rhetoric_surface_control_packet_v1
source_inputs:
  - phase10_s02_research_dossier
  - phase10_s04_claim_admissibility
  - phase10_s05_reader_spine
  - phase10_s06_object_granularity
  - terminology_register_v1
artifact_path: examples/materials/phase10_s07_surface_control.yaml
summary: Claim-safe terminology, paragraph job, rhetorical move, and flexible surface-control artifact.
payload:
  schema_version: ppg-s07-rhetoric-surface-control/v0.1
  stage_id: S07
  completion_boundary: rhetoric_surface_control_only_no_new_claims_no_final_prose_no_graph_or_manuscript_completion
  final_prose: Forbidden final manuscript paragraph.
  input_coverage_ledger:
    s02_language_profile_read: true
    s02_misuse_guard_read: true
    s04_claim_capsules_read: true
    s04_allowed_forbidden_wording_read: true
    s05_reader_spine_read: true
    s05_reviewer_question_map_read: true
    s06_object_representation_read: true
    s06_explanation_ladder_read: true
    terminology_register_read: true
    missing_inputs: []
    unresolved_inputs: []
    backflow_targets: []
  claim_surface_rule_map:
    rules:
      - claim_id: claim-mechanism-bounded
        admitted_claim: bounded mechanism-level link between trust-state reasoning and reconfiguration decisions
        support_strength: moderate
        source_s04_capsule: phase10_s04_claim_admissibility#claim-mechanism-bounded
        allowed_verbs: suggests, supports, indicates, is consistent with
        allowed_modifiers: bounded, mechanism-level, current-evidence-limited
        required_qualifiers: within the evaluated result package; not deployment proof
        forbidden_verbs: proves, guarantees, certifies, deploys
        forbidden_modifiers: universal, definitive, deployment-ready
        forbidden_expansions: public-road readiness; full security certification
        allowed_sections: Introduction, Method, Results, Limitations
        forbidden_sections: no section may present deployment readiness as supported
        required_caveats: simulation/result-package boundary must remain visible
        citation_attachment_rule: attach result or evidence citation when mechanism support is asserted
        result_evidence_boundary: moderate support for mechanism relation only
        downstream_writing_permission: usable by S10 through S09 packets with caveat intact
        status: ready
      - claim_id: claim-deployment-rejected
        admitted_claim: deployment-readiness claim is not admissible from current evidence
        support_strength: unsupported
        source_s04_capsule: phase10_s04_claim_admissibility#claim-deployment-rejected
        allowed_verbs: excludes, does not support, remains outside scope
        allowed_modifiers: current-evidence-limited, unsupported
        required_qualifiers: only as forbidden boundary or limitation
        forbidden_verbs: demonstrates, validates, enables
        forbidden_modifiers: field-ready, real-world-proven
        forbidden_expansions: production deployment, public-road validation
        allowed_sections: Limitations, audit notes
        forbidden_sections: contribution statement, abstract conclusion
        required_caveats: state that evidence does not support deployment readiness
        citation_attachment_rule: cite S04 boundary or result limitation when mentioned
        result_evidence_boundary: rejected claim only, not a positive result
        downstream_writing_permission: may be used only as limitation or forbidden-scope guard
        status: ready
  terminology_surface_register:
    terms:
      - object_or_variable_id: obj-trust-state
        canonical_reader_facing_name: trust-state representation
        allowed_variants: trust-state abstraction, security-state representation
        forbidden_variants: deployment trust certificate, production security proof
        first_definition_location: Method first object definition
        abbreviation_policy: avoid abbreviation before method definition
        notation_policy: introduce T_state only after intuitive explanation
        related_claims: claim-mechanism-bounded
        related_sections: Introduction, Method, Results
        required_explanation_level: intuition then operational definition
        confusion_risk: could be read as deployed security certification
        claim_strength_risk: high if paired with proves or guarantees
        status: ready
      - object_or_variable_id: obj-reconfiguration-decision
        canonical_reader_facing_name: reconfiguration decision
        allowed_variants: decision state, reconfiguration action
        forbidden_variants: deployment authority, certified control action
        first_definition_location: Method object sequence
        abbreviation_policy: no abbreviation needed
        notation_policy: a_reconfig allowed only in method formalism
        related_claims: claim-mechanism-bounded
        related_sections: Method, Results
        required_explanation_level: operational definition then empirical instantiation
        confusion_risk: may imply real-world authority if overclaimed
        claim_strength_risk: moderate
        status: ready
      - object_or_variable_id: obj-evidence-boundary
        canonical_reader_facing_name: evidence boundary
        allowed_variants: support boundary, result-package boundary
        forbidden_variants: proof boundary, deployment validation boundary
        first_definition_location: Introduction caveat then Results limitation
        abbreviation_policy: do not abbreviate
        notation_policy: no notation
        related_claims: claim-mechanism-bounded, claim-deployment-rejected
        related_sections: Introduction, Results and limitations
        required_explanation_level: limitation boundary
        confusion_risk: may disappear if only implied
        claim_strength_risk: high if omitted
        status: ready
  internal_id_ban_list:
    items:
      - raw_internal_id_or_pattern: phase10_s06_object_granularity
        replacement: object/granularity control material
        allowed_context_if_any: internal trace tables only, not manuscript prose
        forbidden_context: main manuscript narrative
        reason: stage artifact id leaks production pipeline
        detection_note: block phase10_s prefix in prose-facing output
      - raw_internal_id_or_pattern: claim_boundary_map_v2
        replacement: claim boundary control
        allowed_context_if_any: repository provenance appendix only if explicitly requested
        forbidden_context: abstract, introduction, method, results, discussion
        reason: lab-notebook material handle is not reader-facing terminology
        detection_note: block claim_boundary_map pattern
      - raw_internal_id_or_pattern: obj-trust-state
        replacement: trust-state representation
        allowed_context_if_any: traceability appendix only
        forbidden_context: prose-facing paragraph text
        reason: object id should not replace reader-facing name
        detection_note: block obj- prefix in prose
  paragraph_job_map:
    jobs:
      - unit_id: pj-intro-problem-pressure
        section: Introduction
        reader_question_id: rq-problem-pressure
        paragraph_job: motivate why a bounded mechanism account is needed
        source_claim_ids: claim-mechanism-bounded
        source_object_ids: obj-trust-state, obj-evidence-boundary
        required_evidence: S02 gap plus S04 moderate support boundary
        rhetorical_function: problem pressure and bounded promise
        forbidden_content: deployment readiness, universal proof, fixed exemplar copy
        required_caveats: current evidence supports only bounded mechanism relation
        dependency_on_prior_context: owner claim boundary and S02 comparator gap
        downstream_writer_instruction: use local rhetorical function, not fixed sentence count
      - unit_id: pj-method-object-definition
        section: Method
        reader_question_id: rq-problem-pressure
        paragraph_job: define trust-state representation and reconfiguration decision without over-formalizing early
        source_claim_ids: claim-mechanism-bounded
        source_object_ids: obj-trust-state, obj-reconfiguration-decision
        required_evidence: S06 object cards and explanation ladders
        rhetorical_function: object definition and mechanism role
        forbidden_content: empirical conclusion or deployment authority
        required_caveats: mechanism scope remains paper-internal
        dependency_on_prior_context: Introduction object preview
        downstream_writer_instruction: introduce variables after object roles
      - unit_id: pj-results-boundary
        section: Results and limitations
        reader_question_id: rq-evidence-boundary
        paragraph_job: state what evidence supports and what it excludes
        source_claim_ids: claim-mechanism-bounded, claim-deployment-rejected
        source_object_ids: obj-evidence-boundary
        required_evidence: S04 support map and result-package boundary
        rhetorical_function: result interpretation and limitation boundary
        forbidden_content: field-ready, production-ready, proof language
        required_caveats: deployment readiness remains excluded
        dependency_on_prior_context: Method definitions and result package
        downstream_writer_instruction: attach citation or result reference to every support claim
  rhetorical_move_matrix:
    moves:
      - paragraph_function: problem pressure
        allowed_move_variants: gap-to-need, reader-question framing, bounded contrast
        required_moves: problem condition, reader need, bounded promise
        optional_moves: compact SOTA contrast, caveat preview
        forbidden_moves: universal template, unsupported novelty escalation, fixed sentence-count pattern
        suitable_sections: Introduction
        citation_expectation: cite comparator or S02 source when naming gap
        claim_strength_limit: no stronger than S04 moderate support
        flexibility_rule: order may vary by local paragraph job
        risk_notes: avoid opening every paragraph with the same contrast phrase
      - paragraph_function: object definition
        allowed_move_variants: intuition-to-operation, role-before-notation, example-after-definition
        required_moves: reader-facing name, role, boundary
        optional_moves: notation, example
        forbidden_moves: raw object id, all variables before object role, copied exemplar syntax
        suitable_sections: Method
        citation_expectation: cite method source only when tied to evidence or prior work
        claim_strength_limit: definition cannot imply validated deployment
        flexibility_rule: choose sequence from object load and reader need
        risk_notes: avoid glossary-like flat repetition
      - paragraph_function: result boundary
        allowed_move_variants: result-to-boundary, claim-to-caveat, support-and-exclusion
        required_moves: supported part, excluded part, evidence locator
        optional_moves: limitation implication
        forbidden_moves: proof claim, deployment readiness, certainty escalation
        suitable_sections: Results, Limitations
        citation_expectation: attach result artifact or evidence anchor
        claim_strength_limit: bounded mechanism support only
        flexibility_rule: move order follows evidence salience
        risk_notes: do not hide excluded claim in a footnote-like aside
  flexible_language_control:
    statistics_are_descriptive: true
    no_sentence_level_word_count_enforcement: true
    no_fixed_paragraph_length_rule: true
    no_uniform_sentence_cadence: true
    no_exemplar_copying: true
    distributional_similarity_only: true
    local_rhetorical_function_first: true
    claim_boundary_first: true
    readability_first: true
  surface_rules:
    claim_strength_rules:
      - moderate support must use bounded verbs
      - unsupported deployment readiness must appear only as exclusion or limitation
    hedge_policy:
      - use suggests or indicates for moderate support
      - avoid proves or guarantees
    citation_attachment_rules:
      - attach evidence when asserting mechanism support
      - attach boundary trace when stating rejected deployment claim
    comparison_language_policy:
      - compare to SOTA only within S03/S04-supported contrast
    limitation_language_policy:
      - state excluded generalization directly and early enough to prevent overpromise
    result_language_policy:
      - distinguish mechanism consistency from deployment validation
    method_language_policy:
      - define objects before variables and notation
    anti_template_policy:
      - no fixed sentence count or identical paragraph move order
    anti_lab_notebook_policy:
      - replace material ids and run paths with reader-facing concepts
    anti_internal_id_policy:
      - block phase10_s, claim_boundary_map, obj-, var-, and raw claim ids in prose
  forbidden_expression_list:
    categories:
      - category: overclaim terms
        forbidden_patterns: proves, guarantees, certifies, definitive
        reason: would strengthen S04 moderate support
        safe_alternative: suggests, supports, indicates, is consistent with
      - category: deployment overreach terms
        forbidden_patterns: deployment-ready, field-ready, public-road validated, production security proof
        reason: S04 rejected deployment-readiness claim
        safe_alternative: outside current evidence, not supported by current result package
      - category: internal id patterns
        forbidden_patterns: phase10_s, claim_boundary_map, obj-, var-, claim-mechanism-bounded
        reason: internal handles leak pipeline and lab-notebook smell
        safe_alternative: reader-facing concept name or citation-supported phrase
      - category: rigid template patterns
        forbidden_patterns: every paragraph must contain exactly, fixed word count, identical move order
        reason: S02 statistics are descriptive priors only
        safe_alternative: select move variant by local rhetorical function
  coverage_ledger:
    claim_capsules_read:
      - claim-mechanism-bounded
      - claim-deployment-rejected
    claim_capsules_with_surface_rules:
      - claim-mechanism-bounded
      - claim-deployment-rejected
    claim_capsules_unresolved: []
    objects_variables_read:
      - obj-trust-state
      - obj-reconfiguration-decision
      - obj-evidence-boundary
    objects_variables_with_terminology_rules:
      - obj-trust-state
      - obj-reconfiguration-decision
      - obj-evidence-boundary
    objects_variables_unresolved: []
    reader_questions_read:
      - rq-problem-pressure
      - rq-evidence-boundary
    reader_questions_mapped_to_paragraph_jobs:
      - rq-problem-pressure
      - rq-evidence-boundary
    paragraph_jobs_unresolved: []
    forbidden_expression_categories_populated:
      - overclaim terms
      - deployment overreach terms
      - internal id patterns
      - rigid template patterns
    downstream_handoffs_generated:
      - S09A_S09B
      - S10
      - S12
      - S13
    unresolved_items: []
    backflow_targets: []
  unresolved_surface_control_report:
    items: []
    backflow_targets: []
  downstream_handoff:
    S09A_S09B:
      handoff_summary: Convert surface controls into unit-level writing packet constraints.
      allowed_use: select claim-safe terminology and forbidden-expression checks for each writing unit
      misuse_warning: do not turn rhetorical moves into fixed sentence templates
      items:
        - claim_surface_rule_map
        - terminology_surface_register
        - paragraph_job_map
    S10:
      handoff_summary: Use paragraph jobs, terminology rules, and forbidden expressions during candidate prose drafting.
      allowed_use: paragraph-level drafting constraints through task packets
      misuse_warning: do not cite S07 as authority for new claims or final prose completion
      items:
        - paragraph jobs for introduction, method, and results boundary
        - forbidden overclaim and internal-id patterns
    S12:
      handoff_summary: Audit integrated candidate for claim-strength drift, terminology drift, internal-id leakage, and rigid template use.
      allowed_use: consistency review checks
      misuse_warning: do not rewrite whole manuscript solely from S07 controls
      items:
        - claim-strength drift checks
        - internal-id leakage checks
        - template rigidity checks
    S13:
      handoff_summary: Support adversarial review and safe repair wording without changing admissible claim meaning.
      allowed_use: reviewer loss-signal classification and safe rewrite constraints
      misuse_warning: do not use forbidden-expression list as final style preference list detached from claim support
      items:
        - overclaim attack checks
        - terminology confusion checks
        - deployment overreach checks
  surface_safety_audit:
    no_new_claims: true
    no_claim_strengthening: true
    no_final_prose: true
    no_rigid_language_template: true
    no_internal_id_leakage: true
    no_completion_overclaim: true
    remaining_risks:
      - S10 must keep these controls flexible and local-function-dependent
  candidate_return:
    candidate_artifact: examples/materials/phase10_s07_surface_control.yaml
    evidence:
      - every S04 claim capsule has a surface rule
      - every S06 object has reader-facing terminology control
      - S02 language statistics remain descriptive, not prescriptive
      - downstream handoffs are explicit
    remaining_risks:
      - later writing must not mistake move variants for a fixed prose template
validators:
  - validate_material:S07RhetoricSurfaceControl
  - input_coverage_required:S07
  - claim_surface_rule_map_required:S07
  - terminology_surface_register_required:S07
  - internal_id_ban_list_required:S07
  - flexible_language_control_required:S07
downstream_consumers:
  - S09A
  - S09B
  - S10
  - S12
  - S13
invalidation_policy:
  stale_when:
    - S02 language profile changes
    - S04 claim capsules or wording boundaries change
    - S05 reader spine changes
    - S06 object/granularity controls change
provenance:
  packet_id: phase10_s07_rhetoric_surface_control_packet_v1
