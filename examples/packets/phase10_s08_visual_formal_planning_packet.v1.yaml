schema_version: ppg-task-packet/v0.1
packet_id: phase10_s08_visual_formal_planning_packet_v1
status: planned
stage_id: S08
stage_contract_ref: examples/stage-contracts/S08.stage-contract.json
task_kind: visual_formal_planning
agent_type: designer
mission: Plan figures/tables/formal objects with evidence-backed proof roles.
target_material: phase10_s08_visual_contract
input_materials:
  - evidence_inventory_v1
  - claim_boundary_map_v2
  - reader_spine_v1
  - terminology_register_v1
  - reference_sidecar_v1
mandatory_controls:
  evidence_inventory: evidence_inventory_v1
  claim_boundary: claim_boundary_map_v2
  reader_spine: reader_spine_v1
  terminology_register: terminology_register_v1
  reference_sidecar: reference_sidecar_v1
  nature_overlay_ref: runtime/stage_overlay_registry.json#nature_expert_writing
  nature_overlay_stage_binding: S08
  nature_overlay_packet_clauses:
    - "nature_overlay_ref:nature_expert_writing"
    - "nature_stage_binding:S08"
    - "nature_overlay_role:primary"
evidence_anchors:
  - examples/materials/evidence_inventory.v1.yaml
  - examples/materials/claim_boundary_map.v2.yaml
  - examples/materials/reader_spine.v1.yaml
  - examples/materials/terminology_register.v1.yaml
  - examples/materials/reference_sidecar.v1.yaml
forbidden_routes:
  - mark_graph_complete
  - dispatch_subagents
  - write_outside_allowed_write_paths
  - change_owner_intent
allowed_actions:
  - read_material_bundle
  - draft_candidate_artifact
  - return_evidence
allowed_read_paths:
  - examples/materials/evidence_inventory.v1.yaml
  - examples/materials/claim_boundary_map.v2.yaml
  - examples/materials/reader_spine.v1.yaml
  - examples/materials/terminology_register.v1.yaml
  - examples/materials/reference_sidecar.v1.yaml
allowed_write_paths:
  - examples/materials/phase10_s08_visual_contract.yaml
allowed_tools:
  - "none"
output_artifact_path: examples/materials/phase10_s08_visual_contract.yaml
expected_output_schema: ppg-material/v0.1
validators:
  - "validate_packet:phase10_stage_binding"
  - "content_validator:S08"
  - "stage_overlay:nature_expert_writing:S08"
return_format:
  candidate_artifact: required
  evidence: required
  remaining_risks: required
  missing_material_report: required_if_blocked
ingestion_target: phase10_s08_visual_contract
stop_condition: Return candidate artifact/material, evidence, and remaining risks only; do not mark graph or manuscript completion.
failure_report_format: ppg-missing-material-report/v0.1
worker_boot_clause: completion_forbidden; no_recursive_orchestration; allowed_write_paths; MissingMaterialReport required when materials are missing; return candidate/evidence only.
completion_forbidden: true
no_recursive_orchestration: true
owner_gate_required: false
