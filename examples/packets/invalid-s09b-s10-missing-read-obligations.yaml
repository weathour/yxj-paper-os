schema_version: ppg-task-packet/v0.1
packet_id: invalid_s09b_s10_missing_read_obligations
status: planned
stage_id: S10
stage_contract_ref: examples/stage-contracts/S10.stage-contract.json
task_kind: writing
agent_type: writer
mission: Produce a candidate target-unit draft for the intro mechanism callout using only the S09A-selected rich controls. Preserve S04 claim boundaries, S05 reader function, S06 object granularity, S07 terminology/surface controls, and S08 visual callout boundary. Return candidate artifact, evidence trace, and remaining risks only; do not mark graph or manuscript completion.
target_material: phase10_intro_callout_candidate
input_materials:
  - phase10_s09a_rich_control_bundle
  - phase10_s04_claim_admissibility
  - phase10_s05_reader_spine
  - phase10_s06_object_granularity
  - phase10_s07_surface_control
  - phase10_s08_visual_formal_plan
mandatory_controls:
  selected_control_bundle: phase10_s09a_rich_control_bundle
  claim_boundary: phase10_s04_claim_admissibility
  reader_spine: phase10_s05_reader_spine
  object_granularity: phase10_s06_object_granularity
  surface_control: phase10_s07_surface_control
  visual_formal_plan: phase10_s08_visual_formal_plan
  hard_constraints_required: true
  context_usage_labels_required: true
  background_not_claim_authority: true
  single_writer_lock_required: true
  nature_overlay_ref: "runtime/stage_overlay_registry.json#nature_expert_writing"
  nature_overlay_stage_binding: S10
  nature_overlay_packet_clauses:
    - "nature_overlay_ref:nature_expert_writing"
    - "nature_stage_binding:S10"
    - "nature_overlay_role:primary"
evidence_anchors:
  - examples/materials/phase10_s09a_rich_control_bundle.yaml
  - examples/materials/phase10_s04_claim_admissibility.yaml
  - examples/materials/phase10_s05_reader_spine.yaml
  - examples/materials/phase10_s06_object_granularity.yaml
  - examples/materials/phase10_s07_surface_control.yaml
  - examples/materials/phase10_s08_visual_formal_plan.yaml
forbidden_routes:
  - mark_graph_complete
  - mark_manuscript_complete
  - claim_submission_or_publication_readiness
  - dispatch_subagents
  - write_outside_allowed_write_paths
  - change_owner_intent
  - alter_unrelated_sections
  - introduce_new_claims
  - strengthen_claims_beyond_s04
allowed_actions:
  - read_material_bundle
  - draft_candidate_artifact
  - return_evidence
allowed_read_paths:
  - examples/materials/phase10_s09a_rich_control_bundle.yaml
  - examples/materials/phase10_s04_claim_admissibility.yaml
  - examples/materials/phase10_s05_reader_spine.yaml
  - examples/materials/phase10_s06_object_granularity.yaml
  - examples/materials/phase10_s07_surface_control.yaml
  - examples/materials/phase10_s08_visual_formal_plan.yaml
allowed_write_paths:
  - examples/candidate-artifacts/phase10_intro_callout_candidate.md
allowed_tools:
  - "none"
output_artifact_path: examples/candidate-artifacts/phase10_intro_callout_candidate.md
expected_output_schema: ppg-section-draft/v0.1
expected_material_type: CandidateArtifactReturn
expected_payload_schema: ppg-candidate-return/v0.1
internal_execution_protocol:
  work_queue_required: true
  coverage_ledger_required: true
  unresolved_register_required: true
  downstream_handoff_required: true
  no_silent_omission: true
  no_new_claims: true
  no_claim_strengthening: true
  required_passes:
    - pass_id: read_selected_control_bundle
      required_output: control_digest_applied
    - pass_id: obey_context_usage_labels
      required_output: background_not_claim_authority
    - pass_id: draft_target_unit_only
      required_output: candidate_artifact
    - pass_id: return_evidence_and_risks
      required_output: CandidateArtifactReturn
output_contract:
  material_type: CandidateArtifactReturn
  payload_schema: ppg-candidate-return/v0.1
  completion_boundary: candidate_artifact_only_no_graph_or_manuscript_completion
  required_modules:
    - candidate_artifact
    - evidence
    - remaining_risks
coverage_ledgers_required:
  - selected_control_bundle
  - evidence_trace
  - remaining_risks
descriptive_not_prescriptive_controls:
  rich_context_allowed_when_labeled: true
  background_context_not_claim_authority: true
  no_fixed_sentence_or_paragraph_counts: true
control_digest_policy:
  status: non_authoritative_navigation_only
  may_not_be_cited_as_evidence: true
  may_not_replace_material_dereference: true
global_material_coverage:
  status: pass
  claims_covered:
    - claim_authority_loss_requires_bounded_reconfiguration
  reader_questions_covered:
    - rq-problem-pressure
  evidence_artifacts_covered:
    - examples/materials/phase10_s04_claim_admissibility.yaml#support_strength_map
  visual_formal_needs_covered:
    - "fig:authority-loss-reconfiguration-schematic"
  deferred_controls_open:
    - alg-formal-method-details deferred to later Method packet
  blocks_s10_batch: false
unit_material_closure:
  target_unit_id: unit-intro-mechanism-callout
  closure_status: complete
  must_dereference:
    - examples/materials/phase10_s09a_rich_control_bundle.yaml#hard_constraints
    - examples/materials/phase10_s04_claim_admissibility.yaml#support_strength_map
    - examples/materials/phase10_s05_reader_spine.yaml#reader_spine
    - examples/materials/phase10_s06_object_granularity.yaml#object_cards
    - examples/materials/phase10_s07_surface_control.yaml#terminology_rules
    - examples/materials/phase10_s08_visual_formal_plan.yaml#figure_contracts
  may_read_background:
    - examples/materials/phase10_s09a_rich_control_bundle.yaml#global_orientation
  forbidden_materials:
    - stale_or_archive_material_without_repromotion
    - owner_gated_private_decisions
  block_if_missing:
    - S04 claim/evidence boundary
    - S05 reader question
    - S07 internal-id ban list
material_access_manifest:
  authority_root: examples/materials/phase10_s09a_rich_control_bundle.yaml
  allowed_authority_status:
    - candidate
    - committed
  forbidden_status:
    - stale
    - archive_reference_only
    - owner_gated_unresolved
  required_selectors:
    - hard_constraints
    - claim_control_bundle
    - reader_context_bundle
    - object_context_bundle
    - surface_control_bundle
    - visual_formal_control_bundle
material_read_obligations: {}
deferred_control_ledger:
  controls:
    - control_id: alg-formal-method-details
      required_for: later Method packet
      status: deferred_nonblocking_for_target_unit
      blocking_before_s12: true
  blocking_unresolved_count: 0
section_specific_blockers:
  section_type: introduction
  block_if_missing:
    - S04 claim/evidence boundary
    - S05 reader question
    - S07 surface-control guard
  missing_material_policy: block_candidate_output
validators:
  - "validate_packet:phase10_stage_binding"
  - "stage_overlay:nature_expert_writing:S10"
  - "s09b_context_usage_preserved:S10"
  - "s04_claim_boundary_required:S10"
  - "single_writer_lock:S10"
return_format:
  candidate_artifact: required
  evidence: required
  remaining_risks: required
  missing_material_report: required_if_blocked
ingestion_target: phase10_intro_callout_candidate
stop_condition: Return candidate artifact/material, evidence, and remaining risks only; do not mark graph or manuscript completion.
failure_report_format: ppg-missing-material-report/v0.1
worker_boot_clause: completion_forbidden; no_recursive_orchestration; obey allowed_write_paths; use S04 claim boundaries as hard constraints; MissingMaterialReport required when materials are missing; return candidate/evidence/remaining risks only.
completion_forbidden: true
no_recursive_orchestration: true
owner_gate_required: false

# S10 ideal packet-bound writing controls (added by UG10).
hard_constraints:
  s04_admitted_claims:
    - claim_authority_loss_requires_bounded_reconfiguration
  s04_forbidden_claims:
    - universal_safety_guarantee
    - optimality_without_reported_evidence
  allowed_wording:
    - bounded reconfiguration under authority-loss conditions
    - candidate mechanism for preserving platoon coherence
  forbidden_wording:
    - guarantees universal safety
    - proves optimal security
  required_caveats:
    - scope limited to the modeled authority-loss setting and available evidence anchors
  evidence_anchors:
    - examples/materials/phase10_s04_claim_admissibility.yaml
  no_new_claims: true
  no_claim_strengthening: true
local_context:
  reader_question: How should a reader understand the mechanism before seeing the formal model and experiments?
  paragraph_or_unit_job: Introduce the mechanism callout as a bounded explanatory bridge, not as a result claim.
  section_function: Introduction mechanism setup
  required_claims:
    - claim_authority_loss_requires_bounded_reconfiguration
  required_objects:
    - zero_trust_reconfiguration_controller
    - authority_loss_event
  required_evidence:
    - examples/materials/phase10_s04_claim_admissibility.yaml
  rhetorical_moves:
    - problem_setup
    - bounded_mechanism_description
    - forward_pointer_to_visual_formal_objects
adjacent_context:
  previous_unit_summary: The introduction has motivated V2X authority loss as a coordination-risk setting.
  next_unit_expectation: The next unit should transition to formal assumptions and evidence-backed evaluation.
  prior_definitions:
    - platoon authority
    - bounded reconfiguration
  later_payoff_targets:
    - S08 schematic callout
    - S11 figure/caption artifact
  do_not_preempt:
    - Do not state final theorem-like or experimental conclusions.
  use_as_background_only:
    - exemplar language distribution from S02
background_context_usage:
  use_as_background_only: true
  not_claim_authority: true
  no_metric_matching_as_rule: true
negative_controls:
  forbidden_claim_wording:
    - guarantees universal safety
    - universally optimal
  unsupported_novelty_terms:
    - first ever
    - unprecedented
  unsupported_generalization:
    - all traffic scenarios
  certainty_overreach:
    - always prevents
  internal_id_leakage:
    - claim_authority_loss_requires_bounded_reconfiguration
    - unit-intro-mechanism-callout
  rigid_template_pattern:
    - fixed sentence count
  lab_notebook_smell:
    - TODO
section_or_unit_move_plan:
  target_unit_id: unit-intro-mechanism-callout
  paragraph_jobs:
    - job_id: p1-mechanism-bridge
      reader_question: How does the mechanism respond when authority is degraded?
      allowed_claims:
        - claim_authority_loss_requires_bounded_reconfiguration
      required_evidence:
        - examples/materials/phase10_s04_claim_admissibility.yaml
      required_objects:
        - zero_trust_reconfiguration_controller
        - authority_loss_event
      object_granularity: intuitive_description
      rhetorical_moves:
        - problem_setup
        - bounded_mechanism_description
        - forward_pointer_to_visual_formal_objects
      visual_callouts:
        - "fig:authority-loss-reconfiguration-schematic"
      forbidden_content:
        - universal_safety_guarantee
        - final result claim
      required_caveats:
        - modeled authority-loss scope only
      stop_condition: One bounded candidate paragraph plus traces; no section-wide rewrite.
claim_boundary_controls:
  items:
    - s04_admitted_claims
    - s04_allowed_wording
    - s04_forbidden_wording
    - s04_required_caveats
object_granularity_controls:
  items:
    - use intuitive mechanism description before formal definitions
    - avoid algorithmic detail in this intro callout
terminology_surface_controls:
  items:
    - use bounded reconfiguration as canonical term
    - avoid internal IDs in paper-facing prose
    - no rigid template sentence counts
visual_formal_controls:
  items:
    - schematic is explanatory rather than empirical evidence
    - figure callout must not claim unsupported performance
    - caption boundary stays with S11
single_writer_lock:
  target_artifact: phase10_intro_callout_candidate
  locked_unit: unit-intro-mechanism-callout
  lock_owner: S10_writer
  allowed_write_path: examples/candidate-artifacts/phase10_intro_callout_candidate.md
  conflict_policy: no concurrent writer for this target unit
  stale_packet_policy: recompile through S09B if upstream controls change
packet_authority_boundary:
  completion_forbidden: true
  no_recursive_orchestration: true
  controller_owned_completion: true
  owner_intent_change_forbidden: true
  graph_commit_forbidden: true
  publication_claim_forbidden: true
