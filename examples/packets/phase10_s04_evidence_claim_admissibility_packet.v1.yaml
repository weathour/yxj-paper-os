  evidence: required
  remaining_risks: required
  missing_material_report: required_if_blocked
ingestion_target: phase10_s04_claim_admissibility
stop_condition: Return candidate artifact/material, evidence, and remaining risks only; do not mark graph or manuscript completion.
failure_report_format: ppg-missing-material-report/v0.1
worker_boot_clause: completion_forbidden; no_recursive_orchestration; allowed_write_paths; MissingMaterialReport required when materials are missing; return candidate/evidence only.
completion_forbidden: true
no_recursive_orchestration: true
owner_gate_required: false
