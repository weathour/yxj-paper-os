schema_version: ppg-task-packet/v0.1
packet_id: phase10_s02_sota_analysis_packet_v1
status: planned
stage_id: S02
stage_contract_ref: examples/stage-contracts/S02.stage-contract.json
task_kind: sota_analysis
agent_type: researcher
mission: Compile a bounded SOTA/template/language research dossier from source inventory and reference sidecars; report descriptive distributions only, never generation laws.
target_material: phase10_s02_research_dossier
input_materials:
  - evidence_inventory_v1
  - claim_boundary_map_v2
  - reader_spine_v1
  - terminology_register_v1
  - reference_sidecar_v1
mandatory_controls:
  evidence_inventory: evidence_inventory_v1
  claim_boundary: claim_boundary_map_v2
  reader_spine: reader_spine_v1
  terminology_register: terminology_register_v1
  reference_sidecar: reference_sidecar_v1
  nature_overlay_ref: runtime/stage_overlay_registry.json#nature_expert_writing
  nature_overlay_stage_binding: S02
  nature_overlay_packet_clauses:
    - "nature_overlay_ref:nature_expert_writing"
    - "nature_stage_binding:S02"
    - "nature_overlay_role:primary"
  completion_boundary: research_profile_only_no_contribution_freeze_no_claim_wording_no_graph_or_manuscript_completion
  no_final_prose: true
  no_claim_or_contribution_freeze: true
  no_exemplar_copying: true
evidence_anchors:
  - examples/materials/evidence_inventory.v1.yaml
  - examples/materials/claim_boundary_map.v2.yaml
  - examples/materials/reader_spine.v1.yaml
  - examples/materials/terminology_register.v1.yaml
  - examples/materials/reference_sidecar.v1.yaml
forbidden_routes:
  - mark_graph_complete
  - dispatch_subagents
  - write_outside_allowed_write_paths
  - change_owner_intent
allowed_actions:
  - read_material_bundle
  - draft_candidate_artifact
  - return_evidence
allowed_read_paths:
  - examples/materials/evidence_inventory.v1.yaml
  - examples/materials/claim_boundary_map.v2.yaml
  - examples/materials/reader_spine.v1.yaml
  - examples/materials/terminology_register.v1.yaml
  - examples/materials/reference_sidecar.v1.yaml
allowed_write_paths:
  - examples/materials/phase10_s02_research_dossier.yaml
allowed_tools:
  - "none"
output_artifact_path: examples/materials/phase10_s02_research_dossier.yaml
expected_output_schema: ppg-material/v0.1
expected_material_type: S02ResearchDossier
expected_payload_schema: ppg-s02-research-dossier/v0.1
internal_execution_protocol:
  work_queue_required: true
  coverage_ledger_required: true
  unresolved_register_required: true
  downstream_handoff_required: true
  no_silent_omission: true
  no_new_claims_unless_stage_allows: true
  no_final_prose: true
  required_passes:
    - pass_id: source_citation_exemplar_inventory
      objective: Confirm every source cluster, citation anchor, venue exemplar, and language sample is present, excluded with reason, or unresolved.
    - pass_id: sota_family_mapping
      objective: Cluster SOTA comparator families and record coverage status without deciding final contribution wording.
    - pass_id: comparator_source_verification
      objective: Attach source locators and citation verification status to each comparator family.
    - pass_id: template_exemplar_structure_extraction
      objective: Extract section/move/exemplar structure while forbidding copyable sentence templates.
    - pass_id: language_rhetorical_profile_extraction
      objective: Quantify paragraph functions, syntax patterns, lexicon, citations, results narrative, limitations language, and style distributions as descriptive priors.
    - pass_id: downstream_handoff_backflow
      objective: Produce S03/S05/S07 handoffs, misuse warnings, and unresolved S01/S00 backflow targets.
output_contract:
  material_type: S02ResearchDossier
  payload_schema: ppg-s02-research-dossier/v0.1
  required_modules:
    - completion_boundary
    - research_scene_profile
    - sota_comparator_map
    - template_exemplar_profile
    - template_language_profile
    - descriptive_not_prescriptive_controls
    - source_coverage_ledger
    - exemplar_sample_register
    - language_profile_sample_limits
    - sota_family_coverage_ledger
    - unresolved_source_report
    - downstream_handoff_coverage
    - misuse_guard
    - citation_verification_report
    - candidate_return
coverage_ledgers_required:
  - source_coverage_ledger
  - exemplar_sample_register
  - language_profile_sample_limits
  - sota_family_coverage_ledger
  - unresolved_source_report
  - downstream_handoff_coverage
descriptive_not_prescriptive_controls:
  statistics_are_descriptive: true
  no_sentence_or_paragraph_rule_generation: true
  exemplar_copying_forbidden: true
  allow_deviation_when_claim_boundary_requires: true
  preserve_claim_boundary_over_metric_matching: true
  forbidden_interpretations:
    - Do not convert ranges, averages, or quantiles into fixed sentence-count or paragraph-count rules.
    - Do not reuse exemplar phrasing as copyable text.
    - Do not freeze contribution, final claim wording, manuscript readiness, submission readiness, or publication readiness.
validators:
  - "validate_packet:phase10_stage_binding"
  - "validate_material:S02ResearchDossier"
  - "content_validator:S02:research_dossier_payload"
  - "descriptive_not_prescriptive:S02"
  - "stage_overlay:nature_expert_writing:S02"
return_format:
  candidate_artifact: required
  evidence: required
  remaining_risks: required
  missing_material_report: required_if_blocked
ingestion_target: phase10_s02_research_dossier
stop_condition: Return candidate S02ResearchDossier material, evidence, unresolved/backflow register, and remaining risks only; do not mark graph, claim, manuscript, submission, or publication completion.
failure_report_format: ppg-missing-material-report/v0.1
worker_boot_clause: completion_forbidden; no_recursive_orchestration; allowed_write_paths; MissingMaterialReport required when materials are missing; return candidate/evidence only; S02 statistics are descriptive_not_prescriptive and never sentence_rule or paragraph_rule output.
completion_forbidden: true
no_recursive_orchestration: true
owner_gate_required: false
