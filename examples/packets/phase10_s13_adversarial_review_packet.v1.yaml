schema_version: ppg-task-packet/v0.1
packet_id: phase10_s13_adversarial_review_packet_v1
status: planned
stage_id: S13
stage_contract_ref: examples/stage-contracts/S13.stage-contract.json
task_kind: adversarial_review
agent_type: critic
mission: Review the S12 structured integrated candidate package and associated traces/control materials as an adversarial critic; generate actionable review/loss findings with severity, evidence, affected artifacts, affected locations, nearest responsible stage, and S14 routing; do not rewrite, repair, review a PDF as the primary object, export PDF, mark completion, or dispatch agents.
target_material: phase10_s13_adversarial_review_report
input_materials:
  - phase10_s12_integration_report
  - phase10_s10_candidate_text_return
  - phase10_s11_figure_caption_artifact_bundle
  - phase10_s04_claim_admissibility
  - phase10_s05_reader_spine
  - phase10_s06_object_granularity
  - phase10_s07_rhetoric_surface_control
  - phase10_s08_visual_formal_plan
mandatory_controls:
  s12_integrated_candidate_package: examples/materials/phase10_s12_integration_report.json
  s10_candidate_trace_ref: examples/materials/phase10_s10_candidate_text_return.json
  s11_visual_caption_trace_ref: examples/materials/phase10_s11_figure_caption_artifact_bundle.json
  s04_claim_boundary_ref: examples/materials/phase10_s04_claim_admissibility.yaml
  s05_reader_spine_ref: examples/materials/phase10_s05_reader_spine.yaml
  s06_object_granularity_ref: examples/materials/phase10_s06_object_granularity.yaml
  s07_surface_control_ref: examples/materials/phase10_s07_surface_control.yaml
  s08_visual_formal_ref: examples/materials/phase10_s08_visual_formal_plan.yaml
  nature_overlay_ref: runtime/stage_overlay_registry.json#nature_expert_writing
  nature_overlay_stage_binding: S13
  nature_overlay_packet_clauses:
    - "nature_overlay_ref:nature_expert_writing"
    - "nature_stage_binding:S13"
    - "nature_overlay_role:primary"
s13_review_input_package:
  primary_object: structured_s12_integrated_candidate_package
  pdf_primary_review_forbidden: true
  required_sources:
    - s12_integrated_candidate_package
    - s12_validator_report
    - s10_candidate_traces
    - s11_visual_caption_traces
    - s04_claim_boundaries
    - s05_reader_spine
    - s06_object_granularity_controls
    - s07_surface_controls
    - s08_visual_formal_contracts
structured_s12_candidate:
  integrated_candidate_ref: examples/materials/phase10_s12_integration_report.json#payload.integrated_manuscript_candidate
  module_inventory_ref: examples/materials/phase10_s12_integration_report.json#payload.module_inventory
  trace_index_ref: examples/materials/phase10_s12_integration_report.json#payload.trace_index
  validator_report_ref: examples/materials/phase10_s12_integration_report.json#payload.validator_report
reviewer_panel_profile:
  - technical_method_reviewer
  - empirical_evaluation_reviewer
  - domain_application_reviewer
  - journal_scope_or_editorial_reviewer
adversarial_review_protocol:
  required_passes:
    - boot_authority_boundary
    - review_object_inventory
    - review_scope_definition
    - claim_evidence_attack
    - reader_path_attack
    - method_result_attack
    - figure_caption_attack
    - terminology_surface_attack
    - desk_reject_risk_synthesis
    - review_findings_generation
    - finding_actionability_gate
    - candidate_return
  ordered_execution_required: true
finding_taxonomy:
  severity_values:
    - low
    - medium
    - high
    - blocker
  required_finding_fields:
    - finding_id
    - finding_type
    - severity
    - affected_artifact
    - affected_location
    - evidence
    - reviewer_rationale
    - source_trace
    - nearest_responsible_stage
    - recommended_backflow_target
    - suggested_repair_scope
    - blocks_progression
    - resolution_status
local_backflow_routing_rules:
  accepted_findings_route_to: S14
  nearest_responsible_stage_required: true
  local_repair_scope_required: true
  direct_repair_forbidden: true
  whole_manuscript_rewrite_forbidden: true
evidence_anchors:
  - examples/materials/phase10_s12_integration_report.json
  - examples/materials/phase10_s10_candidate_text_return.json
  - examples/materials/phase10_s11_figure_caption_artifact_bundle.json
  - examples/materials/phase10_s04_claim_admissibility.yaml
  - examples/materials/phase10_s05_reader_spine.yaml
  - examples/materials/phase10_s06_object_granularity.yaml
  - examples/materials/phase10_s07_surface_control.yaml
  - examples/materials/phase10_s08_visual_formal_plan.yaml
forbidden_routes:
  - mark_graph_complete
  - dispatch_subagents
  - write_outside_allowed_write_paths
  - change_owner_intent
  - alter_unrelated_sections
  - claim_submission_or_publication_readiness
  - introduce_new_claims
  - mark_manuscript_complete
  - strengthen_claims_beyond_s04
allowed_actions:
  - read_material_bundle
  - draft_candidate_artifact
  - return_evidence
allowed_read_paths:
  - examples/materials/phase10_s12_integration_report.json
  - examples/materials/phase10_s10_candidate_text_return.json
  - examples/materials/phase10_s11_figure_caption_artifact_bundle.json
  - examples/materials/phase10_s04_claim_admissibility.yaml
  - examples/materials/phase10_s05_reader_spine.yaml
  - examples/materials/phase10_s06_object_granularity.yaml
  - examples/materials/phase10_s07_surface_control.yaml
  - examples/materials/phase10_s08_visual_formal_plan.yaml
allowed_write_paths:
  - examples/materials/phase10_s13_adversarial_review_report.json
allowed_tools:
  - "none"
output_artifact_path: examples/materials/phase10_s13_adversarial_review_report.json
expected_output_schema: ppg-material/v0.1
expected_material_type: S13AdversarialReviewReport
expected_payload_schema: ppg-s13-adversarial-review-report/v0.1
internal_execution_protocol:
  required_passes:
    - boot_authority_boundary
    - review_object_inventory
    - review_scope_definition
    - claim_evidence_attack
    - reader_path_attack
    - method_result_attack
    - figure_caption_attack
    - terminology_surface_attack
    - desk_reject_risk_synthesis
    - review_findings_generation
    - finding_actionability_gate
    - candidate_return
  subagent_execution_order: sequential_inside_single_critic_context
  verifier_lane_required: true
output_contract:
  required_outputs:
    - review_scope
    - review_object_inventory
    - reviewer_panel_report
    - desk_reject_risk_report
    - reader_experience_report
    - claim_evidence_review
    - figure_caption_review
    - review_findings
    - finding_actionability_report
    - validator_report
    - candidate_artifact_return
  each_finding_must_include:
    - severity
    - evidence
    - affected_artifact
    - affected_location
    - nearest_responsible_stage
    - recommended_backflow_target
  rejected_output_patterns:
    - vague_review_comment_without_evidence_or_location
    - rewritten_manuscript_text
    - pdf_primary_review
    - direct_repair_execution
validators:
  - "validate_packet:phase10_stage_binding"
  - "content_validator:S13_review_object_inventory"
  - "content_validator:S13_review_scope"
  - "content_validator:S13_reviewer_panel_report"
  - "content_validator:S13_desk_reject_risk_report"
  - "content_validator:S13_reader_experience_report"
  - "content_validator:S13_claim_evidence_review"
  - "content_validator:S13_figure_caption_review"
  - "content_validator:S13_review_findings_schema"
  - "content_validator:S13_finding_actionability"
  - "content_validator:S13_backflow_target_validity"
  - "content_validator:S13_no_uncontrolled_rewrite"
  - "content_validator:S13_no_pdf_primary_review"
  - "content_validator:S13_candidate_return_complete"
  - "stage_overlay:nature_expert_writing:S13"
return_format:
  candidate_artifact: required
  evidence: required
  remaining_risks: required
  missing_material_report: required_if_blocked
ingestion_target: phase10_s13_adversarial_review_report
stop_condition: Return actionable review/loss report, verifier evidence, candidate return, and remaining risks only; do not rewrite, repair, review PDF as primary object, or mark graph/manuscript/submission/publication completion.
failure_report_format: ppg-missing-material-report/v0.1
worker_boot_clause: completion_forbidden; no_recursive_orchestration; allowed_write_paths; MissingMaterialReport required when materials are missing; return candidate/evidence only; S13 reviews structured S12 candidate not PDF and routes findings to S14 without repair execution.
completion_forbidden: true
no_recursive_orchestration: true
owner_gate_required: false
