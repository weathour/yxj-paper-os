schema_version: ppg-task-packet/v0.1
packet_id: phase10_s03_novelty_analysis_packet_v1
status: planned
stage_id: S03
stage_contract_ref: examples/stage-contracts/S03.stage-contract.json
task_kind: novelty_analysis
agent_type: critic
mission: Classify contribution options against S02 SOTA context, evidence readiness, owner boundaries, and reviewer attacks; hand claim-bearing candidates to S04 without freezing final wording.
target_material: phase10_s03_contribution_options
input_materials:
  - phase10_s02_research_dossier
  - evidence_inventory_v1
  - claim_boundary_map_v2
  - reader_spine_v1
  - terminology_register_v1
  - reference_sidecar_v1
mandatory_controls:
  research_dossier: phase10_s02_research_dossier
  evidence_inventory: evidence_inventory_v1
  claim_boundary: claim_boundary_map_v2
  reader_spine: reader_spine_v1
  terminology_register: terminology_register_v1
  reference_sidecar: reference_sidecar_v1
  nature_overlay_ref: runtime/stage_overlay_registry.json#nature_expert_writing
  nature_overlay_stage_binding: S03
  nature_overlay_packet_clauses:
    - "nature_overlay_ref:nature_expert_writing"
    - "nature_stage_binding:S03"
    - "nature_overlay_role:support"
  completion_boundary: contribution_options_only_no_claim_admissibility_no_final_wording_no_graph_or_manuscript_completion
  s04_admissibility_required: true
  no_final_claim_wording: true
  no_final_prose: true
evidence_anchors:
  - examples/materials/phase10_s02_research_dossier.yaml
  - examples/materials/evidence_inventory.v1.yaml
  - examples/materials/claim_boundary_map.v2.yaml
  - examples/materials/reader_spine.v1.yaml
  - examples/materials/terminology_register.v1.yaml
  - examples/materials/reference_sidecar.v1.yaml
forbidden_routes:
  - mark_graph_complete
  - dispatch_subagents
  - write_outside_allowed_write_paths
  - change_owner_intent
allowed_actions:
  - read_material_bundle
  - draft_candidate_artifact
  - return_evidence
allowed_read_paths:
  - examples/materials/phase10_s02_research_dossier.yaml
  - examples/materials/evidence_inventory.v1.yaml
  - examples/materials/claim_boundary_map.v2.yaml
  - examples/materials/reader_spine.v1.yaml
  - examples/materials/terminology_register.v1.yaml
  - examples/materials/reference_sidecar.v1.yaml
allowed_write_paths:
  - examples/materials/phase10_s03_contribution_options.yaml
allowed_tools:
  - "none"
output_artifact_path: examples/materials/phase10_s03_contribution_options.yaml
expected_output_schema: ppg-material/v0.1
expected_material_type: S03ContributionOptions
expected_payload_schema: ppg-s03-contribution-options/v0.1
internal_execution_protocol:
  work_queue_required: true
  coverage_ledger_required: true
  unresolved_register_required: true
  downstream_handoff_required: true
  no_silent_omission: true
  no_new_claims_unless_stage_allows: true
  no_final_prose: true
  required_passes:
    - pass_id: input_boundary_inventory
      objective: List S02 SOTA families, evidence materials, motivation units, and owner-gated assumptions before proposing options.
    - pass_id: candidate_contribution_generation
      objective: Generate candidate contribution options without claiming final novelty or wording.
    - pass_id: sota_contrast_pass
      objective: Compare every option to nearest SOTA family and record what cannot be claimed.
    - pass_id: evidence_readiness_classification
      objective: Classify every option as supported, supportable_after_S04, weak, owner_gated, or rejected.
    - pass_id: reviewer_attack_coherence_pass
      objective: Identify reviewer attacks, missing support, fragmentation risk, and viable bundles.
    - pass_id: rejection_owner_gate_pass
      objective: Record rejected options and semantic shifts requiring owner decision.
    - pass_id: s04_handoff_pass
      objective: Hand only claim-bearing candidates to S04 with evidence-readiness hints, forbidden scope, and unresolved support.
output_contract:
  material_type: S03ContributionOptions
  payload_schema: ppg-s03-contribution-options/v0.1
  required_modules:
    - completion_boundary
    - contribution_option_queue
    - contribution_type_taxonomy
    - sota_contrast_matrix
    - evidence_readiness_score
    - unsupported_claim_register
    - rejected_option_register
    - owner_gated_option_register
    - owner_gated_semantic_shift_log
    - reviewer_attack_map
    - contribution_coherence
    - option_coverage_ledger
    - sota_contrast_coverage
    - s04_handoff
    - s04_handoff_coverage
    - anti_rhetoric_guard
    - unresolved_backflow_register
    - candidate_return
coverage_ledgers_required:
  - contribution_option_queue
  - option_coverage_ledger
  - rejected_option_register
  - owner_gated_option_register
  - sota_contrast_coverage
  - s04_handoff_coverage
  - unresolved_backflow_register
descriptive_not_prescriptive_controls:
  statistics_are_descriptive: true
  no_sentence_or_paragraph_rule_generation: true
  exemplar_copying_forbidden: true
  allow_deviation_when_claim_boundary_requires: true
  preserve_claim_boundary_over_metric_matching: true
  forbidden_interpretations:
    - Do not treat S03 novelty options as final claims.
    - Do not bypass S04 admissibility for exact claim wording, support strength, allowed wording, or forbidden wording.
    - Do not convert venue ambition or Nature overlay into unsupported novelty rhetoric.
validators:
  - "validate_packet:phase10_stage_binding"
  - "validate_material:S03ContributionOptions"
  - "content_validator:S03:contribution_option_payload"
  - "s04_handoff_required:S03"
  - "stage_overlay:nature_expert_writing:S03"
return_format:
  candidate_artifact: required
  evidence: required
  remaining_risks: required
  missing_material_report: required_if_blocked
ingestion_target: phase10_s03_contribution_options
stop_condition: Return candidate S03ContributionOptions material, evidence, rejected/owner-gated registers, S04 handoff, and remaining risks only; do not mark graph, claim, manuscript, submission, or publication completion.
failure_report_format: ppg-missing-material-report/v0.1
worker_boot_clause: completion_forbidden; no_recursive_orchestration; allowed_write_paths; MissingMaterialReport required when materials are missing; return candidate/evidence only; S03 classifies options and must not perform claim_admissibility, final_claim_wording, graph_complete, or manuscript_ready actions.
completion_forbidden: true
no_recursive_orchestration: true
owner_gate_required: false
