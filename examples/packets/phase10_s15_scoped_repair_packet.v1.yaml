schema_version: ppg-task-packet/v0.1
packet_id: phase10_s15_scoped_repair_packet_v1
status: planned
stage_id: S15
stage_contract_ref: examples/stage-contracts/S15.stage-contract.json
task_kind: scoped_repair_execution
agent_type: executor
mission: Execute only the S14-authorized local repair candidate and downstream regeneration evidence for the accepted S13 finding; preserve unrelated nodes, report stale propagation, prove candidate resolution/no-new-high-severity risk, and do not commit graph, export PDF, claim final readiness, or dispatch agents.
target_material: phase10_s15_repair_execution_report
input_materials:
  - phase10_s14_backflow_repair_plan
  - phase10_s13_adversarial_review_report
  - phase10_s06_object_granularity
  - phase10_s07_surface_control
  - phase10_s09a_rich_control_bundle
  - phase10_s09b_task_packet_assembly
  - phase10_s10_candidate_text_return
  - phase10_s12_integration_report
mandatory_controls:
  s14_backflow_plan: examples/materials/phase10_s14_backflow_repair_plan.json
  s13_review_report: examples/materials/phase10_s13_adversarial_review_report.json
  target_material: examples/materials/phase10_s06_object_granularity.yaml
  stale_downstream_set: phase10_s09a_rich_control_bundle, phase10_s09b_task_packet_assembly, phase10_s10_candidate_text_return, phase10_s12_integration_report, phase10_s13_adversarial_review_report
  protected_unrelated_nodes: phase10_s04_claim_admissibility, phase10_s08_visual_formal_plan, phase10_s11_figure_caption_artifact_bundle
  nature_overlay_ref: runtime/stage_overlay_registry.json#nature_expert_writing
  nature_overlay_stage_binding: S15
  nature_overlay_packet_clauses:
    - "nature_overlay_ref:nature_expert_writing"
    - "nature_stage_binding:S15"
    - "nature_overlay_role:primary"
s15_repair_task:
  repair_task_id: s14-task-s06-s07-object-bridge
  source_s14_plan: examples/materials/phase10_s14_backflow_repair_plan.json
  finding_id: s13-reader-object-transition-compressed
  original_source: S13
  severity: medium
repair_scope:
  task_kind: control_reselection_repair
  target_stage: S06
  target_material: phase10_s06_object_granularity
  base_version: v1
  allowed_write_paths:
    - examples/materials/phase10_s15_repair_execution_report.json
  forbidden_write_paths:
    - examples/materials/phase10_s04_claim_admissibility.yaml
    - examples/materials/phase10_s08_visual_formal_plan.yaml
  allowed_actions:
    - read_material_bundle
    - draft_candidate_artifact
    - return_evidence
  forbidden_actions:
    - mark_graph_complete
    - dispatch_subagents
    - change_owner_intent
    - write_outside_allowed_write_paths
pre_repair_snapshot_requirements:
  require_target_material_version: true
  require_downstream_stale_set: true
  require_protected_node_hash_or_ref: true
affected_downstream_set:
  stale_nodes:
    - phase10_s09a_rich_control_bundle
    - phase10_s09b_task_packet_assembly
    - phase10_s10_candidate_text_return
    - phase10_s12_integration_report
    - phase10_s13_adversarial_review_report
  regenerate_nodes:
    - phase10_s09a_rich_control_bundle
    - phase10_s09b_task_packet_assembly
    - phase10_s10_candidate_text_return
  revalidate_nodes:
    - phase10_s12_integration_report
    - phase10_s13_adversarial_review_report
protected_unrelated_nodes:
  - phase10_s04_claim_admissibility
  - phase10_s08_visual_formal_plan
  - phase10_s11_figure_caption_artifact_bundle
diff_locality_requirements:
  changed_paths_must_equal_allowed_write_paths: true
  protected_nodes_unchanged_required: true
  whole_manuscript_rewrite_forbidden: true
finding_resolution_requirements:
  original_finding_id: s13-reader-object-transition-compressed
  allowed_resolution_statuses:
    - resolved_candidate
    - partially_resolved
    - blocked
    - owner_gated
regression_scan_requirements:
  no_new_high_severity_findings: true
  preserve_claim_boundary: true
  preserve_overlay_clauses: true
evidence_anchors:
  - examples/materials/phase10_s14_backflow_repair_plan.json
  - examples/materials/phase10_s13_adversarial_review_report.json
  - examples/materials/phase10_s06_object_granularity.yaml
  - examples/materials/phase10_s07_surface_control.yaml
  - examples/materials/phase10_s09a_rich_control_bundle.yaml
  - examples/materials/phase10_s09b_task_packet_assembly.yaml
  - examples/materials/phase10_s10_candidate_text_return.json
  - examples/materials/phase10_s12_integration_report.json
forbidden_routes:
  - mark_graph_complete
  - dispatch_subagents
  - write_outside_allowed_write_paths
  - change_owner_intent
  - alter_unrelated_sections
  - claim_submission_or_publication_readiness
  - introduce_new_claims
  - mark_manuscript_complete
  - strengthen_claims_beyond_s04
allowed_actions:
  - read_material_bundle
  - draft_candidate_artifact
  - return_evidence
allowed_read_paths:
  - examples/materials/phase10_s14_backflow_repair_plan.json
  - examples/materials/phase10_s13_adversarial_review_report.json
  - examples/materials/phase10_s06_object_granularity.yaml
  - examples/materials/phase10_s07_surface_control.yaml
  - examples/materials/phase10_s09a_rich_control_bundle.yaml
  - examples/materials/phase10_s09b_task_packet_assembly.yaml
  - examples/materials/phase10_s10_candidate_text_return.json
  - examples/materials/phase10_s12_integration_report.json
allowed_write_paths:
  - examples/materials/phase10_s15_repair_execution_report.json
allowed_tools:
  - "none"
output_artifact_path: examples/materials/phase10_s15_repair_execution_report.json
expected_output_schema: ppg-material/v0.1
expected_material_type: S15RepairExecutionReport
expected_payload_schema: ppg-s15-repair-execution-report/v0.1
internal_execution_protocol:
  required_passes:
    - boot_authority_boundary
    - task_interpretation
    - pre_repair_snapshot
    - local_repair_draft
    - affected_downstream_regeneration
    - locality_audit
    - finding_resolution_check
    - regression_scan
    - candidate_return
  verifier_lane_required: true
output_contract:
  required_outputs:
    - repair_task_ack
    - pre_repair_snapshot
    - target_material_diff
    - revised_material_candidate
    - affected_downstream_regeneration_log
    - stale_resolution_report
    - unrelated_node_preservation_report
    - finding_resolution_evidence
    - updated_validator_report
    - new_risk_scan
    - candidate_artifact_return
  forbidden_outputs:
    - graph_commit
    - final_manuscript
    - pdf_export
    - recursive_dispatch
validators:
  - "validate_packet:phase10_stage_binding"
  - "content_validator:S15_strict_packet_ack"
  - "content_validator:S15_diff_locality"
  - "content_validator:S15_unrelated_nodes_unchanged"
  - "content_validator:S15_stale_propagation"
  - "content_validator:S15_finding_resolution"
  - "content_validator:S15_no_new_high_severity"
  - "content_validator:S15_overlay_clause_preserved"
  - "content_validator:S15_candidate_return_schema"
  - "content_validator:S15_no_completion_claim"
  - "stage_overlay:nature_expert_writing:S15"
return_format:
  candidate_artifact: required
  evidence: required
  remaining_risks: required
  missing_material_report: required_if_blocked
ingestion_target: phase10_s15_repair_execution_report
stop_condition: Return scoped repair execution report and evidence only; do not commit graph, mark finding closure, export PDF, claim readiness, or touch unrelated materials.
failure_report_format: ppg-missing-material-report/v0.1
worker_boot_clause: completion_forbidden; no_recursive_orchestration; allowed_write_paths; MissingMaterialReport required when materials are missing; return candidate/evidence only; S15 must obey S14 scope, preserve unrelated nodes, and avoid graph/manuscript/export completion claims.
completion_forbidden: true
no_recursive_orchestration: true
owner_gate_required: false
