    from: validated
    to: complete
    at: fixture-time
  actor_provenance:
    execution_actor_id: manager:session-main
    execution_actor_kind: manager
    execution_actor_lane: paper-architect
    manager_role_at_execution: executor
    run_or_session_id: session-main
