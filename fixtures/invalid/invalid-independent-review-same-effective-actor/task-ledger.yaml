    status: ingested
    ledger_path: state.yaml
  pua_telemetry:
    pressure_level: L0
    failure_count: 0
    failure_mode: null
    pua_diagnosis:
      problem_or_goal: State the bounded paper task before execution.
      evidence: []
      next_action: Proceed through compile -> execute -> collect -> validate -> ingest
        -> state_transition.
    owner_four_questions:
      root_cause_or_target: ''
      impact_surface: ''
      prevention_or_check: ''
      data_or_evidence: ''
    attempts: []
    excluded: []
    next_hypothesis: ''
    manager_action: ''
