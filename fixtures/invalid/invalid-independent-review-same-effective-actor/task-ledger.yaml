    present: true
    intervention_id: MDI-001
    inferred_from_actor_provenance: true
    reason: manager performed a bounded fixture edit to test authority governance
    affected_departments:
    - paper_architecture_and_narrative
    paper_facing: true
    state_sensitive: true
    required_independent_review: true
    independent_review_artifact: reviews/independent-review.yaml
    completion_limit_without_review: candidate
  role_separation:
    executor_actor_id: manager:session-main
    executor_lane: paper-architect
    reviewer_actor_id: manager:session-main
