schema_version: yxj-paper-os/task-ledger/v1
tasks:
- task_id: T001
  route: pipeline
  adapter: native_subagent_pipeline_adapter
  owner_lane: unknown-lane
  agent_type: researcher
  status: complete
  pipeline_stage: state_transition
  scoped_context:
    paper_root: .
    source_map: source-map.yaml
    allowed_paths:
    - source-map.yaml
    - evidence-bank.yaml
  expected_output_artifacts:
  - artifact_id: research-dossier-001
    artifact_type: research-dossier
    path: collected/T001/research-dossier.yaml
  collection_path: collected/T001/
  state_ledger_path: state.yaml
  validator_refs:
  - validate_task_packet
  - validate_subagent_output
  - validate_task_status_transitions
  - validate_pua_telemetry
  collected_outputs:
  - artifact_id: research-dossier-001
    path: collected/T001/research-dossier.yaml
  validator_evidence:
  - validator: validate_task_packet
    status: pass
    report_path: validator-report.yaml
  - validator: validate_subagent_output
    status: pass
    report_path: validator-report.yaml
  - validator: validate_task_status_transitions
    status: pass
    report_path: validator-report.yaml
  - validator: validate_pua_telemetry
    status: pass
    report_path: validator-report.yaml
  state_ingestion:
    status: ingested
    ledger_path: state.yaml
  pua_telemetry:
    pressure_level: L0
    failure_count: 0
    failure_mode: null
    pua_diagnosis:
      problem_or_goal: State the bounded paper task before execution.
      evidence: []
      next_action: Proceed through compile -> execute -> collect -> validate -> ingest
        -> state_transition.
    owner_four_questions:
      root_cause_or_target: ''
      impact_surface: ''
      prevention_or_check: ''
      data_or_evidence: ''
    attempts: []
    excluded: []
    next_hypothesis: ''
    manager_action: ''
    pua_report:
      present: false
      failure_count: 0
      failure_mode: null
      attempts: []
      excluded: []
      next_hypothesis: ''
      manager_action: ''
    seven_item_checklist:
      read_failure_signal: false
      searched_core_problem: false
      read_original_material: false
      verified_prerequisites: false
      reversed_assumption: false
      minimal_isolation: false
      changed_direction: false
  state_transition:
    from: validated
    to: complete
    at: fixture-time
