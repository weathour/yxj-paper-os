<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PPG Runtime 人工把握视图</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <p class="kicker">Paper Production Graph Runtime</p>
      <h1>PPG Runtime 人工把握视图</h1>
      <p class="subtitle">点击任一环节查看输入、输出、验证器、回流目标和相邻流程。</p>
    </div>
    <div class="topbar__actions">
      <a class="link-button" href="../PPG_RUNTIME_CONTROL_BLOCK.md">说明文档</a>
      <a class="link-button" href="../diagrams/ppg-runtime-control-block.png">原控制框图 PNG</a>
    </div>
  </header>

  <main class="app-shell">
    <aside class="side-panel" aria-label="流程导航">
      <label class="search-label" for="searchInput">检索节点、输入或输出</label>
      <input id="searchInput" class="search-input" type="search" placeholder="例如 claim、写作、S14、figure" />

      <section class="panel-section">
        <h2>聚焦路径</h2>
        <div id="presetButtons" class="button-grid"></div>
        <div class="stepper">
          <button id="prevStep" class="small-button" type="button">上一步</button>
          <button id="nextStep" class="small-button" type="button">下一步</button>
        </div>
      </section>

      <section class="panel-section">
        <h2>边类型</h2>
        <div id="edgeFilters" class="filter-list"></div>
      </section>

      <section class="panel-section node-index-section">
        <h2>节点索引</h2>
        <div id="nodeIndex" class="node-index"></div>
      </section>
    </aside>

    <section class="workspace" aria-label="交互式 runtime 图">
      <div class="workspace-toolbar">
        <div class="toolbar-group">
          <button id="roadmapMode" type="button" class="is-active">路线图</button>
          <button id="graphMode" type="button">详细节点图</button>
          <button id="resetFocus" type="button">重置聚焦</button>
          <button id="showReference" type="button">显示/隐藏原图</button>
        </div>
        <div class="toolbar-group" aria-label="缩放控制">
          <button id="fitWidth" type="button">适合宽度</button>
          <button id="zoomOut" type="button">缩小</button>
          <output id="zoomLabel">62%</output>
          <button id="zoomIn" type="button">放大</button>
        </div>
      </div>

      <section id="roadmapGuide" class="roadmap-guide" aria-label="路线图主干关系">
        <p class="flow-rule"><strong>画布规则</strong> 默认只显示当前选中环节的局部关系；选择左侧或下方的聚焦路径时，显示该路径内部的整段流向。每条可见线都从源块底部 OUT 出去，折到左侧汇流总线，再从目标块顶部 IN 进入。</p>
        <div class="guide-row"><strong>主干路线</strong><span class="route-strip">
          <button data-guide-jump="S00">S00 语义契约</button><span>→</span><button data-guide-jump="S01">S01 证据盘点</button><span>→</span><button data-guide-jump="S02">S02 研究场景</button><span>→</span><button data-guide-jump="S03">S03 贡献选项</button><span>→</span><button data-guide-jump="S04">S04 claim 门</button><span>→</span><button data-guide-jump="S05">S05 主脊</button><span>→</span><button data-guide-jump="S06">S06 颗粒度</button><span>→</span><button data-guide-jump="S07">S07 表层控制</button><span>→</span><button data-guide-jump="S09A">S09A 控制选择</button><span>→</span><button data-guide-jump="S09B">S09B 写作包</button><span>→</span><button data-guide-jump="S10">S10 正文</button><span>→</span><button data-guide-jump="S12">S12 集成</button><span>→</span><button data-guide-jump="S13">S13 审核</button><span>→</span><button data-guide-jump="S14">S14 回流编译</button><span>→</span><button data-guide-jump="S15">S15 局部修复</button><span>→</span><button data-guide-jump="S16">S16 交付</button><span>→</span><button data-guide-jump="FINAL">FINAL</button>
        </span></div>
        <div class="guide-row"><strong>图表支路</strong><span class="route-strip"><button data-guide-preset="figures">显示整条图表流</button><span>:</span><button data-guide-jump="S05">S05 主脊</button><span>+</span><button data-guide-jump="S06">S06 功能预算</button><span>+</span><button data-guide-jump="S04">S04 claim/证据</button><span>+</span><button data-guide-jump="S01">S01 数据定位</button><span>→</span><button data-guide-jump="S08">S08 图表规划</button><span>→</span><button data-guide-jump="S11">S11 图表产出</button><span>→</span><button data-guide-jump="S12">S12 集成</button></span></div>
        <div class="guide-row"><strong>审核回流</strong><span class="route-strip backflow-strip"><button data-guide-jump="S14">S14 回流编译</button><span>↩</span><button data-guide-jump="S04">S04 claim/evidence</button><button data-guide-jump="S07">S07 术语表层</button><button data-guide-jump="S09A">S09A 控制重选</button><button data-guide-jump="S09B">S09B 任务包再生成</button><button data-guide-jump="S10">S10 正文局部</button><button data-guide-jump="S12">S12 重新集成</button></span></div>
      </section>

      <div class="canvas-frame" id="roadmapFrame">
        <div id="roadmapStage" class="canvas-stage">
          <div id="roadmapCanvas" class="roadmap-canvas">
            <div id="roadmapLaneLayer" class="lane-layer" aria-hidden="true"></div>
            <svg id="roadmapEdgeLayer" class="edge-layer" aria-hidden="true"></svg>
            <div id="roadmapNodeLayer" class="node-layer"></div>
          </div>
        </div>
      </div>

      <div class="canvas-frame is-hidden" id="canvasFrame">
        <div id="graphStage" class="canvas-stage">
          <div id="graphCanvas" class="graph-canvas">
            <div id="laneLayer" class="lane-layer" aria-hidden="true"></div>
            <svg id="edgeLayer" class="edge-layer" aria-hidden="true"></svg>
            <div id="nodeLayer" class="node-layer"></div>
          </div>
        </div>
      </div>

      <figure id="referenceFigure" class="reference-figure" hidden>
        <img src="../diagrams/ppg-runtime-control-block.png" alt="PPG runtime 完整控制框图" />
        <figcaption>静态 draw.io 控制框图，用于和交互视图交叉核对。</figcaption>
      </figure>
    </section>

    <aside class="detail-panel" aria-live="polite">
      <div id="detailContent" class="detail-content"></div>
    </aside>
  </main>

  <script src="./runtime-graph-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
