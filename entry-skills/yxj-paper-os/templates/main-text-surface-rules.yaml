purpose: Translate internal governance, method, experiment, and export objects into
  reader-facing manuscript language.
owner_department: reader_narrative_governance
consumers:
- manuscript_execution
- review_backflow
- figures
- export_validation
- expression_design_governance
- rendered_surface_gate
required_validators:
- validate_no_internal_codes_in_main_prose
- validate_no_snake_case_constraints_in_main_prose
- validate_no_raw_method_ids_in_main_prose
- validate_no_defensive_claim_boundary_wall
- validate_no_bare_citekeys_in_export
- validate_rendered_pdf_surface_text
- validate_cognitive_load_budget_consumed
- validate_claim_evidence_visibility
- validate_terminology_register_surface
rules:
- Internal family/scenario codes may remain in tables, supplements, or provenance
  artifacts only when explicitly needed; main prose should use reader-facing family
  names.
- Implementation identifiers and trace internals in snake_case must be translated
  into natural-language method descriptions.
- Raw comparator or ablation ids must be translated into reader labels.
- Claim boundaries must be expressed as scope, evidence-strength, and future-work
  logic rather than defensive disclaimer walls.
- Exported PDFs must render citations through the target bibliography pipeline and
  must not expose raw citekeys.
- Figures and captions in the main export must use reader-facing labels even when
  data files use internal ids.
- Cognitive-load budgets must be consumed before dense formal, metric, or terminology-heavy
  prose is reported complete.
- ClaimEvidenceVisibilityMap controls wording strength and cannot upgrade Evidence
  & Method support.
- TerminologyRegister mappings must be checked against the rendered export, not only
  source markdown.
expression_design_object_refs:
- cognitive-load-budget-001
- explanation-ladder-001
- rhetorical-move-matrix-001
- claim-evidence-visibility-map-001
- terminology-register-001
