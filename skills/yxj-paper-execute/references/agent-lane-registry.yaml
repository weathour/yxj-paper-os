schema_version: yxj-paper-os/agent-lane-registry/v2
canonical_field: validator_refs
legacy_aliases:
  validators: validator_refs
installed_agent_types:
- analyst
- architect
- critic
- executor
- explore
- planner
- researcher
- test-engineer
- verifier
- writer
non_subagent_routes:
- omx_question
- team
owner_lane_aliases:
  research-director: umbrella over scene-analyst, exemplar-learner, sota-mapper, and novelty-panel
  verifier: generic verifier alias; prefer method-verifier, style-auditor, state-steward, or final-verifier when possible
  paper-owner-gate: human semantic decision gate represented through omx_question and decision-ledger entry
  taskpacket-governance-owner: PMO lane for additive TaskPacketV2Plus governance; does not replace existing v2 task packet fields
  skill-registry-owner: PMO lane for internal SOP skill registry governance; skills are not hidden managers
  single-writer-lock-owner: PMO lane for section/file/shared-hotspot lock materials
lanes:
- lane_id: taskpacket-governance-owner
  lane_kind: direct_subagent
  recommended_agent_type: architect
  purpose: Maintain additive TaskPacketV2Plus governance while preserving v2 task packet compatibility.
  context_scope:
  - department-io-contract.md
  - task-packet.yaml
  - agent-lane-registry.yaml
  expected_output_artifacts:
  - artifact_type: taskpacket-v2plus-governance
    path_pattern: notes/yxj-paper-os/management/taskpacket-v2plus/<task-id>.yaml
  - artifact_type: validator-report
    path_pattern: .omx/state/yxj-paper-os/validator-reports/<task-id>.yaml
  validator_refs:
  - validate_task_packet
  - validate_task_status_transitions
  - validate_pua_telemetry
  - validate_agent_lane_department_binding
  - validate_task_material_io
  fallback_policy: If the recommended agent_type is unavailable, stop as blocked with unavailable_agent_type evidence; do not silently substitute worker or mark dispatch complete.
  department: pmo
  material_inputs:
  - artifact_type: department-io-contract
  - artifact_type: task-packet-template
  - artifact_type: lane-registry
  material_outputs:
  - artifact_type: TaskPacketV2Plus
  - artifact_type: authority-role-separation
  narrative_binding_required: false
  template_binding_required: false
  validator_coverage:
    department_binding: validate_agent_lane_department_binding
    material_io: validate_task_material_io
    narrative_binding: not_required_for_lane
    template_binding: not_required_for_lane
