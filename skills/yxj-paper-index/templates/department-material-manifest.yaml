schema_version: yxj-paper-os/department-material-manifest/v1
artifact_type: DepartmentMaterialManifest
artifact_id: department-material-manifest-template
status: template
owning_department: pmo
charter_ref: department-charter.yaml
single_public_entry: yxj-paper-os
public_surface_allowed: false
validator_refs:
- validate_department_material_manifest
- validate_no_orphan_material_owner
- validate_no_route_card_completion_claim
- validate_department_state_projection
manifest_rules:
  every_material_requires_primary_department: true
  every_material_requires_validator_gate: true
  every_material_requires_ledger_ingestion_path: true
  department_route_card_is_completion_evidence: false
  department_state_is_completion_evidence: false
  pua_telemetry_is_completion_evidence: false
  completion_invariant: compile -> execute -> collect -> validate -> ingest -> state_transition
materials:
- material_type: ManagerBootChecklist
  primary_department: pmo
  support_departments:
  - review_validation
  produced_by_default_mode: contract_only
  consumers:
  - Paper Manager / PMO
  required_validators:
  - validate_manager_boot_checklist
  ledger_ingestion_path: .omx/state/yxj-paper-os/task-ledger.yaml
  backflow_target: pmo
  closure_evidence_allowed: false
- material_type: DepartmentCharterRegistry
  primary_department: pmo
